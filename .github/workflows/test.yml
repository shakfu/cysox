name: Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install system dependencies
      run: |
        brew install sox libsndfile mad libpng flac lame mpg123 libogg opus opusfile libvorbis

    - name: Setup build environment
      run: |
        bash scripts/setup.sh

    - name: Build and test
      run: |
        uv sync
        uv run pytest tests/ -v

  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libsox-dev \
          libsndfile1-dev \
          libmad0-dev \
          libpng-dev \
          libflac-dev \
          libmp3lame-dev \
          libmpg123-dev \
          libogg-dev \
          libopus-dev \
          libopusfile-dev \
          libvorbis-dev \
          pkg-config \
          cmake

    - name: Build and test
      run: |
        uv sync
        uv run pytest tests/ -v

  memory-leaks-macos:
    name: Memory leak check (macOS)
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install system dependencies
      run: |
        brew install sox libsndfile mad libpng flac lame mpg123 libogg opus opusfile libvorbis

    - name: Setup build environment
      run: |
        bash scripts/setup.sh

    - name: Build
      run: |
        uv sync

    - name: Check for memory leaks
      run: |
        MallocStackLogging=1 uv run leaks --atExit -- python tests/check_leaks.py 2>&1 | tee leaks_output.txt
        # Fail if any leaks detected
        grep -q "0 leaks for 0 total leaked bytes" leaks_output.txt

  memory-leaks-linux:
    name: Memory leak check (Linux/valgrind)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libsox-dev \
          libsndfile1-dev \
          libmad0-dev \
          libpng-dev \
          libflac-dev \
          libmp3lame-dev \
          libmpg123-dev \
          libogg-dev \
          libopus-dev \
          libopusfile-dev \
          libvorbis-dev \
          pkg-config \
          cmake \
          valgrind

    - name: Build
      run: |
        uv sync

    - name: Check for memory leaks
      run: |
        uv run valgrind --leak-check=full --show-leak-kinds=definite \
          --errors-for-leak-kinds=definite --error-exitcode=1 \
          python tests/check_leaks.py

  lint:
    name: Lint code
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Lint with ruff
      run: |
        ruff check src/

    - name: Type check with mypy
      run: |
        mypy src/
